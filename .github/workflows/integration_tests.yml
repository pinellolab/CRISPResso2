name: Run Integration Tests

on:
  push:

  pull_request:
    types: [opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pro: [false, true]
        group:
          - name: "Basic, Params, NHEJ"
            filter: "core"
          - name: "Editors"
            filter: "editor"
          - name: "BAM"
            filter: "bam"
          - name: "Batch, Compare, Aggregate"
            filter: "batch or compare or aggregate"
          - name: "Pooled"
            filter: "pooled"
          - name: "WGS, Asym"
            filter: "wgs or asym"
          - name: "VCF"
            filter: "vcf"

    name: "${{ matrix.group.name }} (Pro: ${{ matrix.pro }})"

    steps:
      - uses: actions/checkout@v4
        with:
          path: CRISPResso2

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          manifest-path: CRISPResso2/pixi.toml
          environments: ${{ matrix.pro && 'test-pro' || 'test' }}
          locked: false
          frozen: false
          cache: false

      - name: Cache Pixi environment
        uses: actions/cache@v4
        with:
          path: CRISPResso2/.pixi
          key: pixi-v2-${{ runner.os }}-${{ runner.arch }}-${{ matrix.pro && 'test-pro' || 'test' }}-${{ hashFiles('CRISPResso2/pixi.toml') }}

      - name: Install MS core fonts
        run: |
          if [ -d ".pixi/msttcorefonts" ]; then
            echo "Using cached fonts"
            sudo mkdir -p /usr/share/fonts/truetype/msttcorefonts
            sudo cp .pixi/msttcorefonts/* /usr/share/fonts/truetype/msttcorefonts/
          else
            echo "Installing fonts from scratch"
            echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer
            mkdir -p .pixi/msttcorefonts
            cp /usr/share/fonts/truetype/msttcorefonts/*.ttf .pixi/msttcorefonts/
          fi
          sudo fc-cache -f
        working-directory: CRISPResso2

      - name: Select Pixi environment
        run: echo "PIXI_ENV=${{ matrix.pro && 'test-pro' || 'test' }}" >> $GITHUB_ENV

      - name: Checkout CRISPResso2_tests
        uses: actions/checkout@v4
        with:
          repository: edilytics/CRISPResso2_tests
          # ref: '<BRANCH-NAME>' # update to specific branch
          path: CRISPResso2_tests

      - name: Checkout CRISPRessoPro
        if: matrix.pro
        uses: actions/checkout@v4
        with:
          repository: edilytics/CRISPRessoPro
          token: ${{ secrets.CRISPRESSOPRO_PAT }}
          path: CRISPRessoPro

      - name: Install environment
        run: cd CRISPResso2 && pixi install -e $PIXI_ENV

      - name: Install CRISPResso packages
        run: |
          cd CRISPResso2
          if [ "$PIXI_ENV" = "test-pro" ]; then
            pixi run -e test-pro install-pro
          else
            pixi run -e test install
          fi

      - name: Rebuild pixi fontconfig cache and clear matplotlib font cache
        run: |
          cd CRISPResso2
          pixi run -e $PIXI_ENV -- fc-cache -f
          pixi run -e $PIXI_ENV -- python -c "import matplotlib; import shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True); print('Cleared', matplotlib.get_cachedir())"

      - name: Run Tests
        run: |
          cd CRISPResso2
          pixi run -e $PIXI_ENV -- pytest ../CRISPResso2_tests/test_cli.py \
            -m "${{ matrix.group.filter }}" -v ${{ !matrix.pro && '--diff-plots' || '' }} --test --print
