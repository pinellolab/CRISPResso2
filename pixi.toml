[workspace]
name = "CRISPResso2"
version = "2.3.4"
description = "Software pipeline for the analysis of genome editing outcomes from deep sequencing data"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = "*"
cython = "*"
scipy = "*"
matplotlib = "*"
seaborn = "*"
pandas = "<3.0"
jinja2 = "*"
fastp = "*"
bowtie2 = "*"
samtools = "*"
plotly = "==5.18.0"
setuptools = "*"
pip = "*"

[target.linux-64.dependencies]
gcc_linux-64 = "*"
gxx_linux-64 = "*"

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-check = "*"
pytest-xdist = "*"
pillow = "*"

[feature.test.pypi-dependencies]
ydiff = "*"
inline-snapshot = "*"

[feature.pro.dependencies]
python-kaleido = "<=0.2.1"

[feature.lint.dependencies]
ruff = "=0.14.13"

[feature.pro.pypi-dependencies]
# Pin kaleido 0.2.1: newer kaleido (1.x) requires plotly >= 6.1.1
# while we're still on plotly 5.18.0.
kaleido = "==0.2.1"

[environments]
default = { features = [], solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "default" }
pro = { features = ["pro"], solve-group = "default" }
test-pro = { features = ["test", "pro"], solve-group = "default" }

[tasks]
install = "pip install -e ."

[feature.test.tasks]
test = { cmd = "pytest tests --cov CRISPResso2", depends-on = ["install"] }

[feature.test.tasks.integration]
cmd = "make $ARGS"
cwd = "../CRISPResso2_tests"
depends-on = ["install"]

[feature.pro.tasks]
install-pro = "pip install -e . && pip install -e ../CRISPRessoPro"

[feature.pro.tasks.pro-unit-test]
cmd = "pytest tests --cov CRISPRessoPro"
cwd = "../CRISPRessoPro"
depends-on = ["install-pro"]

[feature.lint.tasks]
lint = { cmd = "ruff check . --statistics" }
fix = { cmd = "ruff check . --fix" }
